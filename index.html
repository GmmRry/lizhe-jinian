<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李林喆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'PingFang SC','Noto Sans SC',sans-serif;cursor:none;user-select:none;-webkit-user-select:none}
canvas{position:fixed;top:0;left:0;z-index:0}

/* Central text */
.hero{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;text-align:center;pointer-events:none}
.hero h1{
  font-size:clamp(3rem,8vw,7rem);font-weight:900;letter-spacing:.05em;
  background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399,#f472b6,#fbbf24);
  background-size:400% 400%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s ease infinite;
  margin-bottom:16px;
}
.hero p{font-size:clamp(.9rem,2vw,1.2rem);color:rgba(255,255,255,.35);letter-spacing:.2em}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Custom cursor trail dot */
.cursor{position:fixed;pointer-events:none;z-index:9999;width:6px;height:6px;background:white;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(168,139,250,.8),0 0 60px rgba(96,165,250,.4);transition:width .2s,height .2s}
.cursor.active{width:12px;height:12px;box-shadow:0 0 30px rgba(251,191,36,.9),0 0 80px rgba(244,114,182,.6)}

/* Bottom hint */
.hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:2;color:rgba(255,255,255,.2);font-size:.75rem;letter-spacing:.15em;pointer-events:none;animation:pulse 3s ease infinite}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.5}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<div class="hero">
  <h1>李林喆</h1>
  <p>拖动鼠标 · 聚拢星河</p>
</div>
<div class="hint">移动鼠标聚集粒子 · 松开散射</div>

<script>
// ── GPU-accelerated particle system ──
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H, mouseX=-999, mouseY=-999, mouseDown=false;
const PARTICLE_COUNT = 180;
const particles = [];
const colors = [
  'rgba(168,139,250,',  // purple
  'rgba(96,165,250,',   // blue
  'rgba(52,211,153,',   // green
  'rgba(244,114,182,',  // pink
  'rgba(251,191,36,',   // gold
  'rgba(129,140,248,',  // indigo
  'rgba(94,234,212,',   // teal
  'rgba(253,224,71,',   // yellow
];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Particle class
class Particle {
  constructor(){
    this.reset();
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.hx = this.x; this.hy = this.y; // home position
  }
  reset(){
    this.radius = Math.random() * 3 + 1;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.vx = (Math.random() - .5) * .8;
    this.vy = (Math.random() - .5) * .8;
    this.opacity = Math.random() * .5 + .3;
    this.twinkleSpeed = Math.random() * .02 + .005;
    this.twinkleOffset = Math.random() * Math.PI * 2;
    this.angle = Math.random() * Math.PI * 2;
    this.orbitRadius = Math.random() * 200 + 50;
    this.orbitSpeed = (Math.random() - .5) * .003;
  }
  update(t){
    // Twinkling opacity
    this.currentOpacity = this.opacity + Math.sin(t * this.twinkleSpeed + this.twinkleOffset) * .2;

    if (mouseDown) {
      // Attract toward mouse
      const dx = mouseX - this.x;
      const dy = mouseY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const force = Math.min(150 / (dist + 10), 3);
      this.vx += dx / (dist + 1) * force * .15;
      this.vy += dy / (dist + 1) * force * .15;
      // Damping
      this.vx *= .92;
      this.vy *= .92;
    } else {
      // Float back toward home + gentle orbit
      const dx = this.hx - this.x;
      const dy = this.hy - this.y;
      this.vx += dx * .001;
      this.vy += dy * .001;
      this.vx *= .97;
      this.vy *= .97;
      // Orbital drift
      this.angle += this.orbitSpeed;
      this.vx += Math.cos(this.angle) * .02;
      this.vy += Math.sin(this.angle) * .02;
    }

    // Update position
    this.x += this.vx;
    this.y += this.vy;

    // Wrap edges
    if(this.x < -20) this.x = W + 20;
    if(this.x > W + 20) this.x = -20;
    if(this.y < -20) this.y = H + 20;
    if(this.y > H + 20) this.y = -20;
  }
  draw(ctx){
    const r = mouseDown ? this.radius * 1.5 : this.radius;
    const alpha = Math.max(0, Math.min(1, this.currentOpacity));
    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 3);
    glow.addColorStop(0, this.color + (alpha * .6) + ')');
    glow.addColorStop(.5, this.color + (alpha * .15) + ')');
    glow.addColorStop(1, this.color + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 3, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = this.color + alpha + ')';
    ctx.fill();
  }
}

// Init particles
for(let i=0; i<PARTICLE_COUNT; i++){
  particles.push(new Particle());
}

// Mouse trail particles
const trailParticles = [];
const MAX_TRAIL = 40;

function spawnTrailParticle(x, y){
  return {
    x, y,
    vx: (Math.random() - .5) * 4,
    vy: (Math.random() - .5) * 4,
    life: 1,
    decay: Math.random() * .04 + .02,
    radius: Math.random() * 2 + .5,
    color: colors[Math.floor(Math.random() * colors.length)],
  };
}

// Mouse events
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  // Spawn trail particles
  for(let i=0; i<2; i++){
    trailParticles.push(spawnTrailParticle(e.clientX, e.clientY));
    if(trailParticles.length > MAX_TRAIL) trailParticles.shift();
  }
});

document.addEventListener('mousedown', () => {
  mouseDown = true;
  cursorEl.classList.add('active');
  // Burst particles on click
  for(let i=0; i<15; i++){
    const p = spawnTrailParticle(mouseX, mouseY);
    p.vx *= 3; p.vy *= 3; p.radius *= 2;
    trailParticles.push(p);
  }
});

document.addEventListener('mouseup', () => {
  mouseDown = false;
  cursorEl.classList.remove('active');
  // Scatter burst
  for(let p of particles){
    const dx = p.x - mouseX;
    const dy = p.y - mouseY;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    const force = 800 / (dist + 30);
    p.vx += dx / dist * force;
    p.vy += dy / dist * force;
  }
});

// Touch events for mobile
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  mouseDown = true;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top = mouseY + 'px';
  cursorEl.classList.add('active');
  for(let i=0; i<2; i++){
    trailParticles.push(spawnTrailParticle(mouseX, mouseY));
    if(trailParticles.length > MAX_TRAIL) trailParticles.shift();
  }
}, {passive: false});

document.addEventListener('touchend', () => {
  mouseDown = false;
  cursorEl.classList.remove('active');
});

// Animation loop
let time = 0;
function animate(timestamp){
  time = timestamp;
  ctx.clearRect(0, 0, W, H);

  // Update & draw main particles
  for(let p of particles){
    p.update(time);
    p.draw(ctx);
  }

  // Connection lines between nearby particles
  if(mouseDown){
    ctx.globalAlpha = .3;
    for(let i=0; i<particles.length; i+=2){
      for(let j=i+2; j<particles.length; j+=2){
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 80){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(255,255,255,${.06 * (1 - dist/80)})`;
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // Draw & update trail particles
  for(let i=trailParticles.length-1; i>=0; i--){
    const tp = trailParticles[i];
    tp.x += tp.vx;
    tp.y += tp.vy;
    tp.vx *= .95; tp.vy *= .95;
    tp.life -= tp.decay;
    if(tp.life <= 0){
      trailParticles.splice(i, 1);
      continue;
    }
    const alpha = tp.life * .7;
    const glow = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, tp.radius * 4);
    glow.addColorStop(0, tp.color + alpha + ')');
    glow.addColorStop(1, tp.color + '0)');
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tp.radius * 4, 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tp.radius, 0, Math.PI*2);
    ctx.fillStyle = tp.color + alpha + ')';
    ctx.fill();
  }

  // Draw mouse-glow when pressed
  if(mouseDown && mouseX > 0){
    const g = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 50);
    g.addColorStop(0, 'rgba(255,255,255,.15)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 50, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

// Handle mouse leaving/entering window
document.addEventListener('mouseleave', () => {
  mouseDown = false;
  cursorEl.classList.remove('active');
  mouseX = -999; mouseY = -999;
});

requestAnimationFrame(animate);

// Keyboard: press 'R' to scatter all particles
document.addEventListener('keydown', e => {
  if(e.key === 'r' || e.key === 'R'){
    for(let p of particles){
      p.vx += (Math.random()-.5) * 20;
      p.vy += (Math.random()-.5) * 20;
    }
  }
});
</script>
</body>
</html>
