<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>·</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:crosshair}
canvas{display:block;position:fixed;top:0;left:0}
.hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:none;font-family:'PingFang SC','Noto Sans SC',sans-serif;font-size:.65rem;letter-spacing:.25em;color:rgba(255,255,255,.18);transition:all .6s}
.fader{position:fixed;inset:0;z-index:10;pointer-events:none;background:#fff;opacity:0;transition:opacity 1.2s}
</style>
<body>
<div class="fader" id="fader"></div>
<div class="hint" id="hint">拖拽旋转 · 滚轮缩放 · 靠近地球</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene;
scene.fog=new THREE.FogExp2(0x000011,.00003);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.5,800);
camera.position.set(0,5,45);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2.5));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.9,.4,.1);
bloom.threshold=.05;bloom.strength=1.5;bloom.radius=.7;composer.addPass(bloom);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.06;controls.autoRotate=true;controls.autoRotateSpeed=.12;
controls.minDistance=1;controls.maxDistance=350;controls.maxPolarAngle=Math.PI*.7;
controls.target.set(0,-35,-50);controls.update();
const mouse=new THREE.Vector2,raycaster=new THREE.Raycaster;
window.addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1});

// ── Simple noise ──
function fract(n){return n-Math.floor(n)}
function hash2(n){return fract(Math.sin(n)*43758.5453)}
function noise2D(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=x*x*(3-2*x),v=y*y*(3-2*y);const a=(X+Y*57)*131;return lerp(lerp(hash2(a),hash2(a+1),u),lerp(hash2(a+57),hash2(a+58),u),v)}
function lerp(a,b,t){return a+(b-a)*t}
function fbm(x,y){let v=0,a=.5,f=1;for(let i=0;i<5;i++){v+=a*noise2D(x*f,y*f);f*=2.2;a*=.5}return v}

// ═══════════════════════════════════════════
// PROCEDURAL EARTH (no texture dependency)
// ═══════════════════════════════════════════
const earthGroup=new THREE.Group;
earthGroup.position.set(0,-35,-50);scene.add(earthGroup);
const EARTH_R=9;

// Generate procedural Earth surface using vertex colors
const eSeg=128;
const eGeo=new THREE.SphereGeometry(EARTH_R,eSeg,eSeg);
const ePos=eGeo.attributes.position.array;
const eCol=new Float32Array(ePos.length);
const landMask=[];

for(let i=0;i<ePos.length/3;i++){
  const x=ePos[i*3],y=ePos[i*3+1],z=ePos[i*3+2];
  // Convert to lat/lon
  const lat=Math.asin(y/EARTH_R);
  const lon=Math.atan2(z,x);
  // Map to 2D for noise
  const nx=lon/Math.PI*5,ny=lat/Math.PI*5;
  const h=fbm(nx,ny);
  // Ocean: deep blue, Land: green to brown, Ice: white at poles
  const absLat=Math.abs(lat);
  const isLand=h>.55&&absLat<1.3;
  const isIce=absLat>1.2||(h>.6&&absLat>1.0);
  landMask.push(isLand||isIce);
  const col=new THREE.Color;
  if(isIce)col.setHSL(.58,.1,.7+.3*Math.random());
  else if(isLand)col.setHSL(.15+.2*Math.random(),.5+.3*Math.random(),.3+.25*Math.random());
  else col.setHSL(.58+.05*Math.random(),.6+.2*Math.random(),.2+.2*Math.random());
  eCol[i*3]=col.r;eCol[i*3+1]=col.g;eCol[i*3+2]=col.b;
}
eGeo.setAttribute('color',new THREE.BufferAttribute(eCol,3));
eGeo.computeVertexNormals();
const eMat=new THREE.MeshPhongMaterial({vertexColors:true,specular:0x112233,shininess:8,flatShading:false});
const earth=new THREE.Mesh(eGeo,eMat);earthGroup.add(earth);

// Atmosphere shell
const atGeo=new THREE.SphereGeometry(EARTH_R*1.02,64,64);
const atMat=new THREE.MeshBasicMaterial({color:0x4488cc,transparent:true,opacity:.06,blending:THREE.AdditiveBlending,depthWrite:false});
earthGroup.add(new THREE.Mesh(atGeo,atMat));

// Cloud shell
const cloudGeo=new THREE.SphereGeometry(EARTH_R*1.04,48,48);
const cColArr=new Float32Array(cloudGeo.attributes.position.array.length);
for(let i=0;i<cColArr.length/3;i++){
  const p=cloudGeo.attributes.position.array;
  const n=p[i*3]/EARTH_R,p2=p[i*3+1]/EARTH_R,p3=p[i*3+2]/EARTH_R;
  const c=noise2D(Math.atan2(p3,p[i*3])*3,p2*3);
  cColArr[i*3]=cColArr[i*3+1]=cColArr[i*3+2]=c>.5?1:0;
}
cloudGeo.setAttribute('color',new THREE.BufferAttribute(cColArr,3));
const cloudMat2=new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,opacity:.12,blending:THREE.AdditiveBlending,depthWrite:false});
const cloudShell=new THREE.Mesh(cloudGeo,cloudMat2);earthGroup.add(cloudShell);

// Earth lighting
scene.add(new THREE.AmbientLight(0x224466,.5));
const earthLight=new THREE.PointLight(0xffffff,1,25);earthLight.position.set(0,-30,-40);scene.add(earthLight);

// ═══════════════════════════════════════════
// SUN (distant)
// ═══════════════════════════════════════════
const sunGroup=new THREE.Group;sunGroup.position.set(80,20,-120);scene.add(sunGroup);
const sunGeo=new THREE.SphereGeometry(12,48,48);
const sunMat2=new THREE.ShaderMaterial({uniforms:{t:{value:0}},vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`varying vec3 vP;uniform float t;float n(vec3 p){return fract(sin(dot(p,vec3(12.9,78.2,45.5)))*43758.);}void main(){float d=length(vP)/12.;vec3 c=mix(vec3(1.,.85,.2),vec3(1.,.3,.02),d);c+=n(vP+t*.3)*.1;gl_FragColor=vec4(c,1.-smoothstep(.65,1.,d));}`,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
sunGroup.add(new THREE.Mesh(sunGeo,sunMat2));
sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(14,48,48),new THREE.ShaderMaterial({vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`varying vec3 vN;void main(){float r=1.-abs(dot(vN,vec3(0.,0.,1.)));gl_FragColor=vec4(1.,.5,.05,pow(r,4.)*.2);}`,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true})));
const sunLight2=new THREE.DirectionalLight(0xffeedd,2);sunLight2.position.copy(sunGroup.position);scene.add(sunLight2);

// ═══════════════════════════════════════════
// NEBULA (space particles)
// ═══════════════════════════════════════════
const spaceP=new THREE.Group;scene.add(spaceP);

function createNebula(count,innerR,outerR,spreadY,colors){
  const g=new THREE.BufferGeometry;const p=new Float32Array(count*3),c=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const t=Math.random()*Math.PI*2,r=innerR+Math.pow(Math.random(),1.5)*(outerR-innerR),s=t+r*.3;
    p[i*3]=Math.cos(s)*r+(Math.random()-.5)*r*.5;
    p[i*3+1]=(Math.random()-.5)*spreadY;
    p[i*3+2]=Math.sin(s)*r*.6+(Math.random()-.5)*r*.4;
    const col=new THREE.Color;col.setHSL(colors[0]+Math.random()*colors[1],colors[2],colors[3]+Math.random()*colors[4]);
    c[i*3]=col.r;c[i*3+1]=col.g;c[i*3+2]=col.b;
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  return g;
}
spaceP.add(new THREE.Points(createNebula(3000,0,12,3,[.58,.12,.85,.5,.4]),new THREE.PointsMaterial({size:.07,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.9})));
spaceP.add(new THREE.Points(createNebula(3500,4,18,2.5,[.56,.16,.65,.5,.4]),new THREE.PointsMaterial({size:.05,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.65})));
spaceP.add(new THREE.Points(createNebula(2000,0,50,30,[.55,.2,.4,.4,.4]),new THREE.PointsMaterial({size:.04,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.4})));

// Stars
const stGeo=new THREE.BufferGeometry;const ST=5000,stP=new Float32Array(ST*3);
for(let i=0;i<ST;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=180+Math.random()*220;stP[i*3]=r*Math.sin(ph)*Math.cos(th);stP[i*3+1]=r*Math.sin(ph)*Math.sin(th);stP[i*3+2]=r*Math.cos(ph)}
stGeo.setAttribute('position',new THREE.BufferAttribute(stP,3));
spaceP.add(new THREE.Points(stGeo,new THREE.PointsMaterial({size:.18,color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.6})));

// ═══════════════════════════════════════════
// SURFACE WORLD - "Your Name" style
// ═══════════════════════════════════════════
const surfaceGroup=new THREE.Group;
surfaceGroup.position.copy(earthGroup.position);surfaceGroup.visible=false;scene.add(surfaceGroup);

// Ground plane
const tSize=24,tSeg=100;
const tGeo=new THREE.PlaneGeometry(tSize,tSize,tSeg,tSeg);tGeo.rotateX(-Math.PI/2);
const tPos2=tGeo.attributes.position.array;
const tCols=new Float32Array(tPos2.length);
for(let i=0;i<tPos2.length/3;i++){
  const x=tPos2[i*3],z=tPos2[i*3+2];
  const h=fbm(x*.3,z*.3)*5+fbm(x*.7,z*.7)*2+fbm(x*1.8,z*1.8)*.5;
  tPos2[i*3+1]=h;
  const col=new THREE.Color;
  if(h<1.5)col.setHSL(.55,.5,.15+.3*Math.random());
  else if(h<3)col.setHSL(.2+.15*Math.random(),.5,.2+.3*Math.random());
  else if(h<4.5)col.setHSL(.12+.1*Math.random(),.3,.3+.4*Math.random());
  else col.setHSL(0,0,.5+.4*Math.random());
  tCols[i*3]=col.r;tCols[i*3+1]=col.g;tCols[i*3+2]=col.b;
}
tGeo.setAttribute('color',new THREE.BufferAttribute(tCols,3));tGeo.computeVertexNormals();
surfaceGroup.add(new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:.9,metalness:0,flatShading:true})));

// Water
const wGeo2=new THREE.PlaneGeometry(tSize*3,tSize*3);wGeo2.rotateX(-Math.PI/2);
surfaceGroup.add(new THREE.Mesh(wGeo2,new THREE.MeshStandardMaterial({color:0x112244,roughness:.15,metalness:.7,transparent:true,opacity:.75})));

// Trees
for(let i=0;i<60;i++){
  const tx=(Math.random()-.5)*22,tz=(Math.random()-.5)*22;
  const th=fbm(tx*.3,tz*.3)*5+fbm(tx*.7,tz*.7)*2;
  if(th<1||th>4.5)continue;
  surfaceGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(.04,.06,.35,5),new THREE.MeshStandardMaterial({color:0x4a2a0a})));
  surfaceGroup.children[surfaceGroup.children.length-1].position.set(tx,th+.18,tz);
  surfaceGroup.add(new THREE.Mesh(new THREE.ConeGeometry(.15,.4,5),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.2+Math.random()*.2,.6,.2+Math.random()*.3)})));
  surfaceGroup.children[surfaceGroup.children.length-1].position.set(tx,th+.55,tz);
}

// Surface fog
const surfFog=new THREE.FogExp2(0x8899bb,.003);

// ═══════════════════════════════════════════
// "YOUR NAME" STYLE METEOR TRAILS
// Three brothers: meteors falling toward convergence
// ═══════════════════════════════════════════
const brothers=[
  {name:'羿应竣',city:'山西晋中',color:0xff5533,start:{x:-6,y:10,z:-5}},
  {name:'李林喆',city:'湖北荆州监利',color:0x33aaff,start:{x:0,y:11,z:-2}},
  {name:'龚铭名',city:'广州',color:0x22dd66,start:{x:5,y:10,z:4}},
];
const convPoint={x:0,y:4,z:-1}; // convergence in sky

// Meteor trail system for each brother
const meteorTrails=[];
for(let b of brothers){
  const mtGeo=new THREE.BufferGeometry;
  const MP=150;const mtP=new Float32Array(MP*3);const mtD=[];
  for(let j=0;j<MP;j++){
    const progress=j/MP;
    const px=b.start.x+(convPoint.x-b.start.x)*progress;
    const py=b.start.y+(convPoint.y-b.start.y)*progress;
    const pz=b.start.z+(convPoint.z-b.start.z)*progress;
    mtP[j*3]=px;mtP[j*3+1]=py;mtP[j*3+2]=pz;
    mtD.push({px,py,pz,life:Math.random(),speed:.3+Math.random()*.8});
  }
  mtGeo.setAttribute('position',new THREE.BufferAttribute(mtP,3));
  const mtMat=new THREE.PointsMaterial({size:.08,color:new THREE.Color(b.color),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.9});
  const mtPts=new THREE.Points(mtGeo,mtMat);
  surfaceGroup.add(mtPts);
  meteorTrails.push({pts:mtPts,data:mtD,brother:b,MP});
}

// Convergence burst
const burstGeo=new THREE.BufferGeometry;
const BP=200;const bP=new Float32Array(BP*3);const bD=[];
for(let i=0;i<BP;i++){
  const r=Math.random()*3,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  bP[i*3]=convPoint.x+r*Math.sin(ph)*Math.cos(th);bP[i*3+1]=convPoint.y+r*Math.sin(ph)*Math.sin(th);bP[i*3+2]=convPoint.z+r*Math.cos(ph);
  bD.push({r,th,ph,rr:r,speed:.2+Math.random()*1.5});
}
burstGeo.setAttribute('position',new THREE.BufferAttribute(bP,3));
const burstPts=new THREE.Points(burstGeo,new THREE.PointsMaterial({size:.06,color:new THREE.Color('#ffddaa'),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.85}));
surfaceGroup.add(burstPts);

// Subtle convergence glow (not orange beacon)
const convGlowGeo=new THREE.SphereGeometry(.3,16,16);
const convGlowMesh=new THREE.Mesh(convGlowGeo,new THREE.MeshBasicMaterial({color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.9}));
convGlowMesh.position.set(convPoint.x,convPoint.y,convPoint.z);surfaceGroup.add(convGlowMesh);

// ═══════════════════════════════════════════
// SPACE-VISIBLE SUBTLE GLOW (not orange!)
// ═══════════════════════════════════════════
const spaceGlowGroup=new THREE.Group;
spaceGlowGroup.position.copy(earthGroup.position).add(new THREE.Vector3(convPoint.x,convPoint.y,convPoint.z));
scene.add(spaceGlowGroup);
const sgGeo=new THREE.SphereGeometry(.8,16,16);
const sgMat=new THREE.MeshBasicMaterial({color:0xaaccff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.5});
spaceGlowGroup.add(new THREE.Mesh(sgGeo,sgMat));
const sgFarGeo=new THREE.SphereGeometry(3,16,16);
const sgFarMat=new THREE.ShaderMaterial({uniforms:{t:{value:0}},vertexShader:`varying vec3 vN;void main(){vN=normalMatrix*normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`varying vec3 vN;uniform float t;void main(){float a=.06+sin(t*2.)*.03;gl_FragColor=vec4(.6,.8,1.,a);}`,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
spaceGlowGroup.add(new THREE.Mesh(sgFarGeo,sgFarMat));

// Name sprites for surface
for(let b of brothers){
  const canvas=document.createElement('canvas');canvas.width=256;canvas.height=48;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#'+b.color.toString(16).padStart(6,'0');ctx.font='18px PingFang SC';ctx.textAlign='center';
  ctx.fillText(b.name+' · '+b.city,128,28);
  const tex=new THREE.CanvasTexture(canvas);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.position.set(b.start.x,b.start.y-1.5,b.start.z);sp.scale.set(3.5,.65,1);
  surfaceGroup.add(sp);
  // Small glow at start point
  const gp=new THREE.Mesh(new THREE.SphereGeometry(.15,8,8),new THREE.MeshBasicMaterial({color:b.color,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.8}));
  gp.position.set(b.start.x,b.start.y,b.start.z);surfaceGroup.add(gp);
}

// ═══════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════
const clock=new THREE.Clock;let ti=0;
const plane2=new THREE.Plane(new THREE.Vector3(0,0,1),0);
const hint=document.getElementById('hint'),fader=document.getElementById('fader');
let isSurface=false,transAlpha=0;

function animate(ts){
  const dt=Math.min(clock.getDelta(),.15);
  const t=ts*.001;
  const dist=camera.position.length();
  const distToEarth=camera.position.distanceTo(earthGroup.position);

  // Surface transition
  const target=distToEarth<14?1:0;
  transAlpha+=(target-transAlpha)*.02;
  transAlpha=Math.max(0,Math.min(1,transAlpha));
  fader.style.opacity=transAlpha*.7; // white fade for cloud transition

  const showSurf=transAlpha>.6;
  if(showSurf!==isSurface){
    isSurface=showSurf;
    surfaceGroup.visible=isSurface;
    earthGroup.visible=!isSurface;
    spaceP.visible=!isSurface;
    scene.fog=isSurface?surfFog:new THREE.FogExp2(0x000011,.00003);
    controls.autoRotateSpeed=isSurface?.01:.12;
    if(isSurface)controls.target.set(0,5,0);
    else controls.target.set(0,-35,-50);
  }

  // Hint
  if(isSurface)hint.textContent='🌠 三颗流星汇聚于天际';
  else if(distToEarth<30)hint.textContent='✨ 继续缩小...';
  else if(dist>150)hint.textContent='☀️ 深空';
  else hint.textContent='拖拽旋转 · 滚轮缩放 · 靠近那个光点';
  hint.style.opacity=Math.max(0,Math.min(1,(180-dist)/80));

  // Rotations
  spaceP.children[0].rotation.y+=dt*.05;
  spaceP.children[1].rotation.y-=dt*.03;
  spaceP.children[2].rotation.y+=dt*.015;
  earth.rotation.y+=dt*.04;
  cloudShell.rotation.y+=dt*.02;cloudShell.rotation.x+=dt*.008;
  sunMat2.uniforms.t.value=t;
  sgFarMat.uniforms.t.value=t;

  // Meteor trail animation (like Your Name comet)
  for(let mt of meteorTrails){
    const mp=mt.pts.geometry.attributes.position.array;
    for(let i=0;i<mt.MP;i++){
      const d=mt.data[i];
      d.life+=dt*d.speed*.5;
      if(d.life>1)d.life-=1;
      const prog=d.life;
      const bx=mt.brother.start.x,by=mt.brother.start.y,bz=mt.brother.start.z;
      mp[i*3]=bx+(convPoint.x-bx)*prog+(Math.sin(prog*20+d.life*5)*.1*(1-prog));
      mp[i*3+1]=by+(convPoint.y-by)*prog;
      mp[i*3+2]=bz+(convPoint.z-bz)*prog+(Math.cos(prog*20+d.life*5)*.1*(1-prog));
    }
    mt.pts.geometry.attributes.position.needsUpdate=true;
  }

  // Burst particles
  const bp2=burstPts.geometry.attributes.position.array;
  for(let i=0;i<BP;i++){
    const d=bD[i];d.r+=dt*d.speed*.3;
    if(d.r>3)d.r=.01;
    bp2[i*3]=convPoint.x+d.r*Math.sin(d.ph)*Math.cos(d.th);
    bp2[i*3+1]=convPoint.y+d.r*Math.sin(d.ph)*Math.sin(d.th);
    bp2[i*3+2]=convPoint.z+d.r*Math.cos(d.ph);
  }
  burstPts.geometry.attributes.position.needsUpdate=true;

  // Space glow pulse
  const pulse=1+Math.sin(t*2.5)*.4;
  spaceGlowGroup.scale.setScalar(pulse);

  // Trail
  raycaster.setFromCamera(mouse,camera);
  const hit2=new THREE.Vector3;raycaster.ray.intersectPlane(plane2,hit2);
  // (removed mouse trail for cleanliness)

  controls.update();composer.render();
  requestAnimationFrame(animate);
}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
animate();
</script>
</body>
</html>
