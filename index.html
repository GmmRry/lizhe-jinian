<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>·</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020210;overflow:hidden;cursor:crosshair}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#map{position:fixed;inset:0;z-index:5;display:none;background:#1a1a2e}
#map.visible{display:block}
.leaflet-container{background:#1a1a2e!important}
.map-overlay{position:fixed;inset:0;z-index:6;pointer-events:none}
.meteor-line{position:absolute;height:2px;background:transparent;transform-origin:0 50%;filter:blur(1px);z-index:7}
.hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'PingFang SC','Noto Sans SC',sans-serif;font-size:.65rem;letter-spacing:.25em;color:rgba(255,255,255,.18);transition:all .5s}
.fader{position:fixed;inset:0;z-index:8;pointer-events:none;background:#fff;opacity:0;transition:opacity 1s}
.marker-label{font-family:'PingFang SC','Noto Sans SC',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;text-shadow:0 0 8px rgba(255,255,255,.8)}
.convergence-pulse{position:absolute;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#aaccff 30%,transparent 70%);transform:translate(-50%,-50%);animation:cpulse 2s ease infinite;z-index:7}
@keyframes cpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(3);opacity:.2}}
</style>
</head>
<body>
<div id="map"></div>
<div class="fader" id="fader"></div>
<div class="hint" id="hint">拖拽旋转 · 滚轮缩放 · 靠近蓝色光点</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020210, 0.00003);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 600);
camera.position.set(0, 2, 35);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2.5));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.9, 0.4, 0.1);
bloomPass.threshold = 0.05; bloomPass.strength = 1.6; bloomPass.radius = 0.7;
composer.addPass(bloomPass);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.autoRotate = true; controls.autoRotateSpeed = 0.15;
controls.minDistance = 0.8; controls.maxDistance = 350;
controls.maxPolarAngle = Math.PI * 0.72;
controls.target.set(0, 0, 0); controls.update();

const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

function fract(n){return n-Math.floor(n)}
function hash(n){return fract(Math.sin(n)*43758.5453)}
function noise2D(x,y){
  const X=Math.floor(x)&255, Y=Math.floor(y)&255;
  x-=Math.floor(x); y-=Math.floor(y);
  const u=x*x*(3-2*x), v=y*y*(3-2*y);
  return lerp(lerp(hash(X+Y*57),hash(X+1+Y*57),u),lerp(hash(X+(Y+1)*57),hash(X+1+(Y+1)*57),u),v);
}
function lerp(a,b,t){return a+(b-a)*t}
function fbm(x,y){let v=0,a=.5,f=1;for(let i=0;i<5;i++){v+=a*noise2D(x*f,y*f);f*=2.2;a*=.5}return v}

const texLoader = new THREE.TextureLoader();

// ═══ EARTH ═══
const earthGroup = new THREE.Group();
earthGroup.position.set(0, 0, 0);
scene.add(earthGroup);

const earthTex = texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
earthTex.colorSpace = THREE.SRGBColorSpace;
earthTex.anisotropy = 16;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(9, 96, 96),
  new THREE.MeshPhongMaterial({map: earthTex, specular: 0x222244, shininess: 12})
);
earthGroup.add(earth);

earthGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(9.15, 64, 64),
  new THREE.MeshBasicMaterial({color: 0x4488cc, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false})
));

scene.add(new THREE.AmbientLight(0x224466, 0.5));
const earthLight = new THREE.PointLight(0xffffff, 1.2, 30);
earthLight.position.set(10, 5, 15);
scene.add(earthLight);

// ═══ NEBULA ═══
const nebulaGroup = new THREE.Group();
scene.add(nebulaGroup);

function makeNebula(count, innerR, outerR, spreadY, hue, hueRange, sat, light, lightRange){
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(count*3), c = new Float32Array(count*3);
  for(let i=0; i<count; i++){
    const t=Math.random()*Math.PI*2, r=innerR+Math.pow(Math.random(),1.6)*(outerR-innerR), s=t+r*0.3;
    p[i*3]=Math.cos(s)*r+(Math.random()-0.5)*r*0.5;
    p[i*3+1]=(Math.random()-0.5)*spreadY;
    p[i*3+2]=Math.sin(s)*r*0.6+(Math.random()-0.5)*r*0.4;
    const col=new THREE.Color();
    col.setHSL(hue+Math.random()*hueRange, sat, light+Math.random()*lightRange);
    c[i*3]=col.r; c[i*3+1]=col.g; c[i*3+2]=col.b;
  }
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  g.setAttribute('color', new THREE.BufferAttribute(c, 3));
  return g;
}

const l1 = new THREE.Points(makeNebula(3000, 10, 18, 3.5, 0.58, 0.12, 0.85, 0.5, 0.4),
  new THREE.PointsMaterial({size:0.08, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.92}));
nebulaGroup.add(l1);

const l2 = new THREE.Points(makeNebula(4000, 3, 22, 3, 0.56, 0.16, 0.65, 0.5, 0.4),
  new THREE.PointsMaterial({size:0.055, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.7}));
nebulaGroup.add(l2);

const l3 = new THREE.Points(makeNebula(2500, 0, 60, 35, 0.55, 0.2, 0.4, 0.35, 0.45),
  new THREE.PointsMaterial({size:0.045, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.45}));
nebulaGroup.add(l3);

// Stars
const starsGeo = new THREE.BufferGeometry();
const ST = 5000, sp = new Float32Array(ST*3);
for(let i=0; i<ST; i++){
  const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=180+Math.random()*220;
  sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
nebulaGroup.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({
  size:0.18, color:0xffffff, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.6
})));

// ═══ SUN ═══
const sunGroup = new THREE.Group(); sunGroup.position.set(100, 40, -200); scene.add(sunGroup);
const sunMat = new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vP;uniform float uTime;float n(vec3 p){return fract(sin(dot(p,vec3(12.9,78.2,45.5)))*43758.);}void main(){float d=length(vP)/12.;vec3 c=mix(vec3(1.,.85,.2),vec3(1.,.3,.02),d);c+=n(vP+uTime*.3)*.1;gl_FragColor=vec4(c,1.-smoothstep(.65,1.,d));}`,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true
});
sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(12,48,48), sunMat));
sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(14,48,48), new THREE.ShaderMaterial({
  vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vN;void main(){float r=1.-abs(dot(vN,vec3(0.,0.,1.)));gl_FragColor=vec4(1.,.5,.05,pow(r,4.)*.2);}`,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true
})));
const sunLight = new THREE.DirectionalLight(0xffeedd, 2); sunLight.position.copy(sunGroup.position); scene.add(sunLight);

// ═══ SPACE BEACON ═══
const beaconGroup = new THREE.Group(); beaconGroup.position.set(0, 4, -1); scene.add(beaconGroup);
beaconGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshBasicMaterial({color:0xaaccff, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.5})));
const beaconGlow = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.ShaderMaterial({
  uniforms:{t:{value:0}},
  vertexShader:`varying vec3 vN;void main(){vN=normalMatrix*normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vN;uniform float t;void main(){float a=0.04+sin(t*2.5)*0.02;gl_FragColor=vec4(0.5,0.7,1.,a);}`,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true
}));
beaconGroup.add(beaconGlow);

// ═══ ANIMATION LOOP ═══
const clock = new THREE.Clock();
const hint = document.getElementById('hint');
const fader = document.getElementById('fader');
let isSurface = false, transAlpha = 0;

function animate(ts){
  const dt = Math.min(clock.getDelta(), 0.15);
  const t = ts * 0.001;
  const distToEarth = camera.position.distanceTo(earthGroup.position);
  const target = distToEarth < 12 ? 1 : 0;
  transAlpha += (target - transAlpha) * 0.035;
  transAlpha = Math.max(0, Math.min(1, transAlpha));
  fader.style.opacity = transAlpha * 0.6;

  const showSurface = transAlpha > 0.55;
  if(showSurface !== isSurface){
    isSurface = showSurface;
    if(isSurface){ enterSurface(); }
    else { exitSurface(); }
  }

  hint.textContent = isSurface ? '🗺️ 三条流星 · 汇聚于此'
    : distToEarth < 18 ? '🔭 继续滚动缩小...进入地球...'
    : '拖拽旋转 · 滚轮缩放 · 靠近蓝色光点';

  l1.rotation.y += dt * 0.05;
  l2.rotation.y -= dt * 0.03;
  l3.rotation.y += dt * 0.015;
  earth.rotation.y += dt * 0.04;
  sunMat.uniforms.uTime.value = t;
  beaconGlow.material.uniforms.t.value = t;
  beaconGroup.scale.setScalar(1 + Math.sin(t * 2.5) * 0.5);

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ═══ LEAFLET MAP (loaded dynamically) ═══
let leafletLoaded = false;
let map = null;
let convergenceMarker = null;

function loadLeaflet(cb){
  if(leafletLoaded){ cb(); return; }
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = () => { leafletLoaded = true; cb(); };
  document.head.appendChild(script);
}

function enterSurface(){
  renderer.domElement.style.display = 'none';
  const mapDiv = document.getElementById('map');
  mapDiv.classList.add('visible');
  fader.style.opacity = '0';

  loadLeaflet(() => {
    if(!map){
      map = L.map('map', { zoomControl: false, attributionControl: false, center: [32, 112], zoom: 5, minZoom: 3, maxZoom: 12 });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
      // Disable map interaction when we want to scroll back out
      map.scrollWheelZoom.disable();
      map.dragging.disable();
      map.touchZoom.disable();
      map.doubleClickZoom.disable();
    }

    // Clear old markers
    map.eachLayer(layer => { if(layer instanceof L.CircleMarker) map.removeLayer(layer); });

    // Three brothers as glowing circle markers
    const brothers = [
      {lat:37.69, lng:112.74, color:'#ff5533'},
      {lat:29.82, lng:112.90, color:'#33aaff'},
      {lat:23.13, lng:113.26, color:'#22dd66'},
    ];

    const points = [];
    brothers.forEach(b => {
      const marker = L.circleMarker([b.lat, b.lng], {
        radius: 8, color: b.color, fillColor: b.color, fillOpacity: 0.8, weight: 3, className: 'glow-marker'
      }).addTo(map);
      marker.bindTooltip(`<b>${b.name}</b><br>${b.city}`, {direction:'top', className:'marker-label'});
      points.push(marker.getLatLng());
    });

    // Convergence point (center of three)
    const clat = (brothers[0].lat + brothers[1].lat + brothers[2].lat) / 3;
    const clng = (brothers[0].lng + brothers[1].lng + brothers[2].lng) / 3;

    // Draw meteor lines on the map using SVG overlay
    if(convergenceMarker) map.removeLayer(convergenceMarker);
    convergenceMarker = L.circleMarker([clat, clng], {
      radius: 12, color: '#eeddff', fillColor: '#eeddff', fillOpacity: 0.9, weight: 0, className: 'convergence-marker'
    }).addTo(map);

    // Draw lines using Leaflet polyline
    brothers.forEach(b => {
      L.polyline([[b.lat, b.lng], [clat, clng]], {
        color: b.color, weight: 2, opacity: 0.6, dashArray: '5, 10', className: 'meteor-path'
      }).addTo(map);
    });

    map.invalidateSize();
    setTimeout(() => map.invalidateSize(), 500);
  });
}

function exitSurface(){
  renderer.domElement.style.display = 'block';
  document.getElementById('map').classList.remove('visible');
}

animate(performance.now());
</script>
</body>
</html>
