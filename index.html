<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李林喆 · 星河</title>
<style>
  :root{--bg:#050510}
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);overflow:hidden;
    font-family:'PingFang SC','Noto Sans SC','Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    cursor:crosshair;
  }
  canvas{display:block;position:fixed;top:0;left:0}

  .overlay{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%,transparent 0%,rgba(5,5,16,.4) 65%,rgba(5,5,16,.82) 100%);
  }

  .type-wrap{
    position:fixed;bottom:13vh;left:50%;transform:translateX(-50%);z-index:3;
    text-align:center;pointer-events:none;
  }
  .type-sub{
    font-size:clamp(.7rem,1.2vw,.85rem);letter-spacing:.35em;
    color:rgba(180,200,255,.4);margin-bottom:14px;text-transform:uppercase;
    animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) .5s both;
  }
  .type-name{
    font-size:clamp(3.5rem,10vw,9rem);font-weight:200;letter-spacing:.08em;line-height:1;
    background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(180,200,255,.7) 45%,rgba(120,150,255,.35) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) .7s both;
  }
  .type-line{
    display:block;width:1px;height:56px;margin:24px auto;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(180,200,255,.45),rgba(255,255,255,0));
    animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) .9s both;
  }
  .type-tag{
    font-size:clamp(.7rem,1vw,.8rem);letter-spacing:.25em;
    color:rgba(180,200,255,.25);
    animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) 1.1s both;
  }
  .hint{
    position:fixed;bottom:32px;right:36px;z-index:3;pointer-events:none;
    font-size:.6rem;letter-spacing:.22em;color:rgba(255,255,255,.1);
    animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) 2s both;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(36px);filter:blur(8px)}
    to{opacity:1;transform:translateY(0);filter:blur(0)}
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="type-wrap">
  <p class="type-sub">Class of 2026 · Nebula</p>
  <h1 class="type-name">李林喆</h1>
  <span class="type-line"></span>
  <p class="type-tag">万物皆星尘 · 你亦如是</p>
</div>

<div class="hint">拖拽旋转 · 滚轮缩放 · 移动触发光迹</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 200);
camera.position.set(0, 0, 28);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), .85, .4, .2
);
bloom.threshold = .1;
bloom.strength = 1.25;
bloom.radius = .6;
composer.addPass(bloom);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = .06;
controls.autoRotate = true;
controls.autoRotateSpeed = .22;
controls.minDistance = 7;
controls.maxDistance = 55;
controls.maxPolarAngle = Math.PI * .75;
controls.target.set(0, 0, 0);
controls.update();

const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// ── Galaxy Core ──
const coreGeo = new THREE.BufferGeometry();
const CORE = 2000;
const corePos = new Float32Array(CORE * 3);
const coreCol = new Float32Array(CORE * 3);

for(let i=0; i<CORE; i++){
  const t = Math.random() * Math.PI * 2;
  const r = Math.pow(Math.random(), 1.9) * 13;
  const spiral = t + r * .38;
  const x = Math.cos(spiral) * r + (Math.random()-.5) * r * .55;
  const y = (Math.random()-.5) * r * .42;
  const z = Math.sin(spiral) * r * .55 + (Math.random()-.5) * r * .38;

  corePos[i*3] = x;
  corePos[i*3+1] = y;
  corePos[i*3+2] = z;

  const col = new THREE.Color();
  col.setHSL(.62 + (r/13)*.08, .85, .5 + Math.random()*.4);
  coreCol[i*3]=col.r; coreCol[i*3+1]=col.g; coreCol[i*3+2]=col.b;
}

coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
coreGeo.setAttribute('color', new THREE.BufferAttribute(coreCol, 3));
const coreMat = new THREE.PointsMaterial({
  size:.07, vertexColors:true, blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:.88,
});
const core = new THREE.Points(coreGeo, coreMat);
scene.add(core);

// ── Outer Halo ──
const haloGeo = new THREE.BufferGeometry();
const HALO = 2400;
const haloPos = new Float32Array(HALO * 3);
const haloCol = new Float32Array(HALO * 3);

for(let i=0; i<HALO; i++){
  const angle = Math.random() * Math.PI * 2;
  const radius = 5.5 + Math.random() * 17;
  const y = (Math.random() - .5) * 2.8;
  haloPos[i*3] = Math.cos(angle) * radius;
  haloPos[i*3+1] = y;
  haloPos[i*3+2] = Math.sin(angle) * radius;
  const col = new THREE.Color();
  col.setHSL(.57 + Math.random()*.16, .65, .55 + Math.random()*.35);
  haloCol[i*3]=col.r; haloCol[i*3+1]=col.g; haloCol[i*3+2]=col.b;
}

haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPos, 3));
haloGeo.setAttribute('color', new THREE.BufferAttribute(haloCol, 3));
const haloMat = new THREE.PointsMaterial({
  size:.045, vertexColors:true, blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:.65,
});
const halo = new THREE.Points(haloGeo, haloMat);
scene.add(halo);

// ── Ambient Dust ──
const dustGeo = new THREE.BufferGeometry();
const DUST = 900;
const dustPos = new Float32Array(DUST * 3);
const dustCol = new Float32Array(DUST * 3);
const dustData = [];

for(let i=0; i<DUST; i++){
  const x = (Math.random()-.5) * 42;
  const y = (Math.random()-.5) * 26;
  const z = (Math.random()-.5) * 38;
  dustPos[i*3]=x; dustPos[i*3+1]=y; dustPos[i*3+2]=z;
  dustData.push({x,y,z,vx:(Math.random()-.5)*.007,vy:(Math.random()-.5)*.007,vz:(Math.random()-.5)*.007});
  const col = new THREE.Color();
  col.setHSL(.58+Math.random()*.16,.45,.5+Math.random()*.4);
  dustCol[i*3]=col.r; dustCol[i*3+1]=col.g; dustCol[i*3+2]=col.b;
}

dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
dustGeo.setAttribute('color', new THREE.BufferAttribute(dustCol, 3));
const dustMat = new THREE.PointsMaterial({
  size:.035, vertexColors:true, blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:.45,
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ── Mouse Trail Sparkles ──
const sparkGeo = new THREE.BufferGeometry();
const SPARK = 100;
const sparkPos = new Float32Array(SPARK * 3);
const sparkLife = new Float32Array(SPARK);

for(let i=0; i<SPARK; i++){
  sparkPos[i*3]=sparkPos[i*3+1]=sparkPos[i*3+2]=0;
  sparkLife[i]=0;
}

sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
const sparkMat = new THREE.PointsMaterial({
  size:.09, color:new THREE.Color('#c8b8ff'), blending:THREE.AdditiveBlending,
  depthWrite:false, transparent:true, opacity:.75,
});
const sparks = new THREE.Points(sparkGeo, sparkMat);
scene.add(sparks);

// ── Animation ──
const clock = new THREE.Clock();
let sparkIdx = 0;
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);

function animate(){
  const dt = Math.min(clock.getDelta(), .12);

  core.rotation.y += dt * .055;
  halo.rotation.y -= dt * .028;
  halo.rotation.x += dt * .012;

  // Float dust
  const dp = dust.geometry.attributes.position.array;
  for(let i=0; i<DUST; i++){
    const d = dustData[i];
    d.x += d.vx; d.y += d.vy; d.z += d.vz;
    if(Math.abs(d.x)>21) d.vx*=-1;
    if(Math.abs(d.y)>13) d.vy*=-1;
    if(Math.abs(d.z)>19) d.vz*=-1;
    dp[i*3]=d.x; dp[i*3+1]=d.y; dp[i*3+2]=d.z;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // Cursor intersection sparks
  raycaster.setFromCamera(mouse, camera);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, hit);

  if(hit && Math.random()<.65){
    const sp = sparkGeo.attributes.position.array;
    const i = sparkIdx % SPARK;
    sp[i*3] = hit.x + (Math.random()-.5)*.25;
    sp[i*3+1] = hit.y + (Math.random()-.5)*.25;
    sp[i*3+2] = (Math.random()-.5)*.15;
    sparkLife[i] = 1;
    sparkIdx++;
  }

  const sp2 = sparkGeo.attributes.position.array;
  for(let i=0; i<SPARK; i++){
    sparkLife[i] -= dt * 1.5;
    if(sparkLife[i]<=0){
      sp2[i*3]=sp2[i*3+1]=sp2[i*3+2]=0;
      sparkLife[i]=0;
    }
  }
  sparkGeo.attributes.position.needsUpdate = true;

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
