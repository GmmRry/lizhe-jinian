<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>·</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020210;overflow:hidden;cursor:none}
  canvas{display:block;position:fixed;top:0;left:0}
  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 280px 60px rgba(2,2,16,.9);
  }
</style>
</head>
<body>
<div class="vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

// ── Scene ──
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, .1, 200);
camera.position.set(0, 0, 32);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// ── Post Processing ──
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// Bloom
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.9,.4,.15);
bloom.threshold = .08;
bloom.strength = 1.4;
bloom.radius = .7;
composer.addPass(bloom);

// Depth of Field (Bokeh)
const bokeh = new BokehPass(scene, camera, {
  focus: 15,
  aperture: .0004,
  maxblur: .015,
});
composer.addPass(bokeh);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = .05;
controls.autoRotate = true;
controls.autoRotateSpeed = .18;
controls.minDistance = 6;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI * .78;
controls.target.set(0, 0, 0);
controls.update();

// ── Mouse ──
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// ── Deep Field Nebula ──
// Layer 1: Dense Hot Core (in focus)
const coreGeo = new THREE.BufferGeometry();
const L1 = 2200;
const p1 = new Float32Array(L1*3); const c1 = new Float32Array(L1*3);
for(let i=0;i<L1;i++){
  const t=Math.random()*Math.PI*2;
  const r=Math.pow(Math.random(),2.2)*10;
  const s=t+r*.42;
  p1[i*3]=Math.cos(s)*r+(Math.random()-.5)*r*.4;
  p1[i*3+1]=(Math.random()-.5)*r*.35;
  p1[i*3+2]=Math.sin(s)*r*.45+(Math.random()-.5)*r*.3;
  const col=new THREE.Color();col.setHSL(.6+(r/10)*.1,.9,.55+Math.random()*.4);
  c1[i*3]=col.r;c1[i*3+1]=col.g;c1[i*3+2]=col.b;
}
coreGeo.setAttribute('position',new THREE.BufferAttribute(p1,3));
coreGeo.setAttribute('color',new THREE.BufferAttribute(c1,3));
const core=new THREE.Points(coreGeo,new THREE.PointsMaterial({
  size:.06,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.9
}));
scene.add(core);

// Layer 2: Warm Mid Ring
const midGeo = new THREE.BufferGeometry();
const L2=2800;
const p2=new Float32Array(L2*3);const c2=new Float32Array(L2*3);
for(let i=0;i<L2;i++){
  const t=Math.random()*Math.PI*2;
  const r=5+Math.random()*14;
  const y=(Math.random()-.5)*2.2;
  p2[i*3]=Math.cos(t)*r;p2[i*3+1]=y;p2[i*3+2]=Math.sin(t)*r;
  const col=new THREE.Color();col.setHSL(.58+Math.random()*.14,.7,.55+Math.random()*.35);
  c2[i*3]=col.r;c2[i*3+1]=col.g;c2[i*3+2]=col.b;
}
midGeo.setAttribute('position',new THREE.BufferAttribute(p2,3));
midGeo.setAttribute('color',new THREE.BufferAttribute(c2,3));
const midRing=new THREE.Points(midGeo,new THREE.PointsMaterial({
  size:.045,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.6
}));
scene.add(midRing);

// Layer 3: Outer Cool Filaments (subject to DOF blur)
const outGeo=new THREE.BufferGeometry();
const L3=3200;
const p3=new Float32Array(L3*3);const c3=new Float32Array(L3*3);
for(let i=0;i<L3;i++){
  const t=Math.random()*Math.PI*2;
  const r=14+Math.random()*20;
  const y=(Math.random()-.5)*3.5;
  p3[i*3]=Math.cos(t)*r+(Math.random()-.5)*3;
  p3[i*3+1]=y+(Math.random()-.5)*2;
  p3[i*3+2]=Math.sin(t)*r+(Math.random()-.5)*3;
  const col=new THREE.Color();col.setHSL(.62+Math.random()*.12,.55,.45+Math.random()*.4);
  c3[i*3]=col.r;c3[i*3+1]=col.g;c3[i*3+2]=col.b;
}
outGeo.setAttribute('position',new THREE.BufferAttribute(p3,3));
outGeo.setAttribute('color',new THREE.BufferAttribute(c3,3));
const outRing=new THREE.Points(outGeo,new THREE.PointsMaterial({
  size:.04,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.5
}));
scene.add(outRing);

// Layer 4: Deep Background Dust (heavily blurred by DOF)
const deepGeo=new THREE.BufferGeometry();
const L4=2000;
const p4=new Float32Array(L4*3);const c4=new Float32Array(L4*3);const d4=[];
for(let i=0;i<L4;i++){
  const x=(Math.random()-.5)*55,y=(Math.random()-.5)*35,z=(Math.random()-.5)*45;
  p4[i*3]=x;p4[i*3+1]=y;p4[i*3+2]=z;
  d4.push({x,y,z,vx:(Math.random()-.5)*.006,vy:(Math.random()-.5)*.006,vz:(Math.random()-.5)*.006});
  const col=new THREE.Color();col.setHSL(.56+Math.random()*.18,.4,.45+Math.random()*.35);
  c4[i*3]=col.r;c4[i*3+1]=col.g;c4[i*3+2]=col.b;
}
deepGeo.setAttribute('position',new THREE.BufferAttribute(p4,3));
deepGeo.setAttribute('color',new THREE.BufferAttribute(c4,3));
const deepDust=new THREE.Points(deepGeo,new THREE.PointsMaterial({
  size:.03,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.35
}));
scene.add(deepDust);

// ── Mouse Trail ──
const trailGeo=new THREE.BufferGeometry();
const TRAIL=120;
const tPos=new Float32Array(TRAIL*3);const tLife=new Float32Array(TRAIL);
for(let i=0;i<TRAIL;i++){tPos[i*3]=tPos[i*3+1]=tPos[i*3+2]=0;tLife[i]=0;}
trailGeo.setAttribute('position',new THREE.BufferAttribute(tPos,3));
const trail=new THREE.Points(trailGeo,new THREE.PointsMaterial({
  size:.1,color:new THREE.Color('#c8b0ff'),blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.7
}));
scene.add(trail);

// ── Geometry accent ring (subtle wireframe) ──
const ringGeo2=new THREE.TorusGeometry(8,.015,32,120);
const ringMat2=new THREE.MeshBasicMaterial({color:0x3a3070,transparent:true,opacity:.16});
const accentRing=new THREE.Mesh(ringGeo2,ringMat2);
accentRing.rotation.x=Math.PI*.42;
scene.add(accentRing);

const ringGeo3=new THREE.TorusGeometry(12,.01,32,140);
const ringMat3=new THREE.MeshBasicMaterial({color:0x2a2560,transparent:true,opacity:.1});
const accentRing2=new THREE.Mesh(ringGeo3,ringMat3);
accentRing2.rotation.x=Math.PI*.55;accentRing2.rotation.y=Math.PI*.3;
scene.add(accentRing2);

// ── Animate ──
const clock=new THREE.Clock();
let trailIdx=0;
const plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);

function animate(){
  const dt=Math.min(clock.getDelta(),.12);

  // Rotate particle layers at different speeds for parallax
  core.rotation.y+=dt*.06;
  midRing.rotation.y-=dt*.035;
  outRing.rotation.y+=dt*.022;
  outRing.rotation.x+=dt*.008;
  accentRing.rotation.z+=dt*.012;
  accentRing2.rotation.z-=dt*.008;

  // Float deep dust
  const dp=deepDust.geometry.attributes.position.array;
  for(let i=0;i<L4;i++){
    const d=d4[i];d.x+=d.vx;d.y+=d.vy;d.z+=d.vz;
    if(Math.abs(d.x)>27)d.vx*=-1;
    if(Math.abs(d.y)>17)d.vy*=-1;
    if(Math.abs(d.z)>22)d.vz*=-1;
    dp[i*3]=d.x;dp[i*3+1]=d.y;dp[i*3+2]=d.z;
  }
  deepDust.geometry.attributes.position.needsUpdate=true;

  // Cursor trail
  raycaster.setFromCamera(mouse,camera);
  const hit=new THREE.Vector3();
  raycaster.ray.intersectPlane(plane,hit);
  if(hit&&Math.random()<.55){
    const tp=trail.geometry.attributes.position.array;
    const i=trailIdx%TRAIL;
    tp[i*3]=hit.x+(Math.random()-.5)*.2;
    tp[i*3+1]=hit.y+(Math.random()-.5)*.2;
    tp[i*3+2]=(Math.random()-.5)*.1;
    tLife[i]=1;
    trailIdx++;
  }
  const tp2=trail.geometry.attributes.position.array;
  for(let i=0;i<TRAIL;i++){
    tLife[i]-=dt*1.4;
    if(tLife[i]<=0){tp2[i*3]=tp2[i*3+1]=tp2[i*3+2]=0;tLife[i]=0;}
  }
  trail.geometry.attributes.position.needsUpdate=true;

  // Animate Bokeh focus subtly
  bokeh.focus=18+Math.sin(performance.now()*.0003)*4;

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

animate();
</script>
</body>
</html>
